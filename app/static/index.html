<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Torrent Sniffer</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<main id="app" hidden>
    <header class="topbar">
        <div class="brand"><h1>Torrent Sniffer</h1></div>
        <div id="account" class="account" hidden>
            <button id="open-settings" class="settings-button" aria-label="Settings" title="Settings">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6h.09A1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9v.09A1.65 1.65 0 0 0 20.91 10H21a2 2 0 1 1 0 4h-.09A1.65 1.65 0 0 0 19.4 15z"></path>
                </svg>
            </button>
            <span id="current-user"></span>
            <button id="logout" class="logout-button" aria-label="Log out" title="Log out">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </div>
        <div class="stats compact-stats">
            <button type="button" class="stat-action" id="open-active">
                <p class="eyebrow">ACTIVE</p><strong id="active-crawls">0</strong>
            </button>
            <div class="crawl-stat">
                <button type="button" class="stat-action" id="open-crawls">
                    <p class="eyebrow">CRAWLS</p><strong id="total-crawls">0</strong>
                </button>
                <aside id="crawl-finish-popover" class="crawl-finish-popover" hidden aria-live="polite">
                    <p id="crawl-finish-message"></p>
                    <div id="crawl-finish-progress" class="crawl-finish-progress"></div>
                </aside>
            </div>
            <div>
                <p class="eyebrow">TORRENTS</p><strong id="total-results">0</strong>
            </div>
        </div>
        <aside class="task-preview" aria-live="polite">
            <div id="active-tasks">
            </div>
        </aside>
    </header>
    <section class="panel controls workflow-panel">
        <span class="step-number" aria-hidden="true">1</span>
        <label class="source-choice">Source<select id="source-select"></select></label>
        <div class="source-actions">
            <button id="add-source">Add</button>
            <button id="edit-source">Edit</button>
            <button id="delete-source">Delete</button>
        </div>
        <label>Remote search<input id="remote-query" placeholder="Ninja Turtles"></label>
        <button id="queue-search" class="primary">Crawl</button>
    </section>
    <section class="panel local-search workflow-panel">
        <span class="step-number" aria-hidden="true">2</span>
        <label class="grow">Local query<input id="local-query" placeholder="Ninja Turtles"></label>
        <label>Match<select id="match-mode">
            <option value="all">All words</option>
            <option value="any">Any word</option>
            <option value="ordered">Words in order</option>
        </select></label>
        <button id="local-search">Search local index</button>
    </section>
    <p id="status" aria-live="polite"></p>
    <section id="result-tools" class="result-tools" hidden>
        <details class="filter-chip">
            <summary id="size-summary">Size</summary>
            <div class="filter-menu"><select id="size-filter">
                <option value="all">All sizes</option>
                <option value="small">Too small · under 4 GB</option>
                <optgroup label="Movies">
                    <option value="movie-standard">4–10 GB</option>
                    <option value="movie-large">8–16 GB</option>
                    <option value="movie-huge">16+ GB</option>
                </optgroup>
                <optgroup label="Series">
                    <option value="series-compact">10–30 GB</option>
                    <option value="series-standard">20–50 GB</option>
                    <option value="series-large">50+ GB</option>
                </optgroup>
                <option value="custom">Custom range…</option>
            </select>
                <button type="button" id="clear-size">Clear</button>
            </div>
        </details>
        <details class="filter-chip">
            <summary id="seeder-summary">Availability</summary>
            <div class="filter-menu"><select id="seeder-filter">
                <option value="0">Any</option>
                <option value="1">Available · 1+</option>
                <option value="100">Strong · 100+</option>
            </select>
                <button type="button" id="clear-seeders">Clear</button>
            </div>
        </details>
        <label class="sort-control">Sort<select id="sort-results">
            <option value="discovered_desc">Recently collected</option>
            <optgroup label="Torrent date">
                <option value="created_desc">Newest first</option>
                <option value="created_asc">Oldest first</option>
            </optgroup>
            <optgroup label="File size">
                <option value="size_desc">Largest first</option>
                <option value="size_asc">Smallest first</option>
            </optgroup>
            <optgroup label="Seeders">
                <option value="seeders_desc">Most seeders first</option>
                <option value="seeders_asc">Fewest seeders first</option>
            </optgroup>
        </select></label></section>
    <section id="results" class="results"></section>
</main>
<dialog id="source-dialog">
    <form id="source-form" method="dialog">
        <header><h2 id="source-dialog-title">Add source</h2>
            <button type="button" class="icon-button" id="close-source-dialog" aria-label="Close">×</button>
        </header>
        <div class="adapter-field"><label>Adapter<select id="source-kind"></select></label>
            <div class="adapter-actions">
                <button type="button" id="add-adapter">Add</button>
                <button type="button" id="edit-adapter">Edit</button>
            </div>
        </div>
        <label>Source URL<input id="source-url" placeholder="https://authorised-source.example" type="url"
                                required></label><label>Initial pause (seconds)<input id="delay" type="number" min="1"
                                                                                      value="20" required></label>
        <footer>
            <button type="button" id="cancel-source">Cancel</button>
            <button class="primary" value="default">Save source</button>
        </footer>
    </form>
</dialog>
<dialog id="adapter-dialog">
    <form id="adapter-form" method="dialog">
        <header><h2 id="adapter-dialog-title">Add adapter</h2>
            <button type="button" class="icon-button" id="close-adapter-dialog" aria-label="Close">×</button>
        </header>
        <label>Adapter JSON<textarea id="adapter-json" spellcheck="false" required></textarea></label>
        <footer>
            <button type="button" id="cancel-adapter">Cancel</button>
            <button class="primary" value="default">Save adapter</button>
        </footer>
    </form>
</dialog>
<template id="result-template">
    <article>
        <div class="result-actions"><a class="magnet" target="_blank" rel="noopener" hidden>Magnet link</a>
            <button class="fetch-magnet">Fetch magnet</button>
            <div class="qbit-action" hidden><select></select>
                <button class="confirm-qbit">Download</button>
            </div>
        </div>
        <a class="title" target="_blank" rel="noopener"></a>
        <p class="metadata"></p>
        <p class="query"></p></article>
</template>
<dialog id="auth-dialog">
    <form id="auth-form" method="dialog">
        <header><h2 id="auth-title">Log in</h2></header>
        <p id="auth-copy" class="hint"></p><label>Username<input id="auth-username" autocomplete="username"
                                                                 required></label><label>Password<input
            id="auth-password" type="password" autocomplete="current-password" required></label><label
            id="auth-confirm-wrap" hidden>Confirm password<input id="auth-confirm" type="password"
                                                                 autocomplete="new-password"></label>
        <p id="auth-error" class="error"></p>
        <footer>
            <button class="primary" id="auth-submit" value="default">Log in</button>
        </footer>
    </form>
</dialog>
<dialog id="settings-dialog">
    <div class="settings">
        <header><h2>Account settings</h2>
            <button type="button" class="icon-button" id="close-settings" aria-label="Close">×</button>
        </header>
        <section class="settings-section">
            <form id="password-form"><h3>Change password</h3><label>New password<input id="new-password" type="password"
                                                                                       autocomplete="new-password"
                                                                                       required></label><label>Confirm
                new password<input id="confirm-new-password" type="password" autocomplete="new-password"
                                   required></label>
                <button>Change password</button>
            </form>
        </section>
        <section id="user-management" class="settings-section" hidden>
            <div class="settings-section-heading"><h3>Users</h3>
                <button type="button" id="add-user">Add user</button>
            </div>
            <div id="user-list"></div>
        </section>
        <section id="qbit-management" class="settings-section" hidden>
            <div class="settings-section-heading"><h3>qBittorrent</h3>
                <button type="button" id="configure-qbit">Configure qBittorrent</button>
            </div>
            <p id="qbit-status" class="hint"></p></section>
        <p id="settings-error" class="error"></p>
        <p id="settings-success" class="success"></p>
    </div>
</dialog>
<dialog id="user-dialog">
    <form id="user-form" method="dialog">
        <header><h2 id="user-dialog-title">Add user</h2>
            <button type="button" class="icon-button" id="close-user-dialog" aria-label="Close">×</button>
        </header>
        <label>Username<input id="user-username" autocomplete="username" required></label><label>Password<input
            id="user-password" type="password" autocomplete="new-password" required></label>
        <p id="user-password-hint" class="hint" hidden>Leave blank to keep the existing password.</p><label>Group<select
            id="user-group">
        <option value="user">User</option>
        <option value="admin">Admin</option>
    </select></label>
        <p id="user-error" class="error"></p>
        <footer>
            <button type="button" id="cancel-user">Cancel</button>
            <button class="primary" value="default">Save user</button>
        </footer>
    </form>
</dialog>
<dialog id="qbit-dialog">
    <form id="qbit-form" method="dialog">
        <header><h2>qBittorrent configuration</h2>
            <button type="button" class="icon-button" id="close-qbit-dialog" aria-label="Close">×</button>
        </header>
        <label>URL<input id="qbit-url" type="url" placeholder="http://qbittorrent:8080" required></label><label>API
        key<input id="qbit-api-key" type="password" autocomplete="off"
                  placeholder="Required for new configuration"></label>
        <div><p class="location-heading">File locations</p>
            <div id="qbit-locations"></div>
            <button type="button" id="add-qbit-location">Add location</button>
        </div>
        <p id="qbit-error" class="error"></p>
        <footer>
            <button type="button" id="remove-qbit">Disable integration</button>
            <span></span>
            <button type="button" id="cancel-qbit">Cancel</button>
            <button class="primary" value="default">Save configuration</button>
        </footer>
    </form>
</dialog>
<dialog id="custom-size-dialog">
    <form id="custom-size-form" method="dialog">
        <header><h2>Custom file size</h2>
            <button type="button" class="icon-button" id="close-custom-size" aria-label="Close">×</button>
        </header>
        <label>Minimum GB<input id="min-size-gb" type="number" min="0" step="0.1"></label><label>Maximum GB <span
            class="hint">(optional)</span><input id="max-size-gb" type="number" min="0" step="0.1"></label>
        <p id="custom-size-error" class="error"></p>
        <footer>
            <button type="button" id="cancel-custom-size">Cancel</button>
            <button class="primary" value="default">Apply range</button>
        </footer>
    </form>
</dialog>
<dialog id="download-error-dialog">
    <div class="download-error-dialog">
        <header><h2>Download could not be started</h2>
            <button type="button" class="icon-button" id="close-download-error" aria-label="Close">×</button>
        </header>
        <p id="download-error-message"></p>
        <footer>
            <button type="button" id="dismiss-download-error">Close</button>
        </footer>
    </div>
</dialog>
<dialog id="crawl-dialog">
    <div class="crawl-dialog-content">
        <header>
            <h2 id="crawl-dialog-title">Crawls</h2>
            <button type="button" class="icon-button" id="close-crawl-dialog" aria-label="Close">×</button>
        </header>
        <p id="crawl-dialog-copy" class="hint"></p>
        <div id="crawl-dialog-jobs" class="jobs"></div>
    </div>
</dialog>
<script src="/static/app.js"></script>
</body>
</html>
