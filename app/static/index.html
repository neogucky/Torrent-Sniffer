<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Torrent Sniffer</title><link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main>
    <header class="topbar">
      <div class="brand"><h1>Torrent Sniffer</h1><p class="notice">Search remote. Filter local.</p><div class="compact-stats"><span><strong id="total-results">0</strong> results</span><span><strong id="total-crawls">0</strong> crawls</span></div></div>
      <aside class="task-preview"><div><p class="eyebrow">ACTIVE</p><strong id="active-crawls">0</strong></div><div id="active-tasks"></div></aside>
    </header>
    <section class="panel controls">
      <label class="source-choice">Source<select id="source-select"></select></label>
      <div class="source-actions"><button id="add-source">Add</button><button id="edit-source">Edit</button><button id="delete-source">Delete</button></div>
      <label>Remote search<input id="remote-query" placeholder="Ninja Turtles"></label>
      <button id="queue-search" class="primary">Start task</button>
    </section>
    <section class="panel local-search">
      <div><p class="eyebrow">SAVED RESULTS</p><h2>All words must match</h2></div>
      <label class="grow">Local query<input id="local-query" placeholder="Ninja Turtles"></label>
      <label class="check"><input id="include-description" type="checkbox"> include descriptions</label>
      <button id="local-search">Search local index</button>
    </section>
    <p id="status" aria-live="polite"></p>
    <section id="results" class="results"></section>
    <section class="panel jobs"><h2>Running tasks</h2><p class="hint">Includes running, stopped, and failed tasks. Stopping takes effect after any request already in flight.</p><div id="running-jobs"></div></section>
    <section class="panel jobs"><h2>Completed tasks</h2><div id="completed-jobs"></div></section>
  </main>
  <dialog id="source-dialog"><form id="source-form" method="dialog"><header><h2 id="source-dialog-title">Add source</h2><button type="button" class="icon-button" id="close-source-dialog" aria-label="Close">×</button></header><div class="adapter-field"><label>Adapter<select id="source-kind"></select></label><div class="adapter-actions"><button type="button" id="add-adapter">Add</button><button type="button" id="edit-adapter">Edit</button></div></div><label>Source URL<input id="source-url" placeholder="https://authorised-source.example" type="url" required></label><label>Initial pause (seconds)<input id="delay" type="number" min="1" value="20" required></label><footer><button type="button" id="cancel-source">Cancel</button><button class="primary" value="default">Save source</button></footer></form></dialog>
  <dialog id="adapter-dialog"><form id="adapter-form" method="dialog"><header><h2 id="adapter-dialog-title">Add adapter</h2><button type="button" class="icon-button" id="close-adapter-dialog" aria-label="Close">×</button></header><label>Adapter JSON<textarea id="adapter-json" spellcheck="false" required></textarea></label><footer><button type="button" id="cancel-adapter">Cancel</button><button class="primary" value="default">Save adapter</button></footer></form></dialog>
  <template id="result-template"><article><a class="title" target="_blank" rel="noopener"></a><p class="metadata"></p><a class="magnet" target="_blank" rel="noopener" hidden></a><button class="fetch-magnet">Fetch magnet</button><p class="query"></p></article></template>
  <script src="/static/app.js"></script>
</body>
</html>
